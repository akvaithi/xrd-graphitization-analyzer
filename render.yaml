# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: on render.com → New → Blueprint → connect this repo → Apply.
services:
  - type: web
    name: xrd-graphitization-analyzer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Render injects $PORT; xrd_webgui binds 0.0.0.0:$PORT automatically.
    startCommand: python3 xrd_webgui.py
    autoDeployTrigger: commit
    healthCheckPath: /
