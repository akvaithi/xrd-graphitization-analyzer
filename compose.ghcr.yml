# Deploy the PREBUILT image from GHCR (no local build needed).
#   docker compose -f compose.ghcr.yml up -d
# or paste into ZimaOS/CasaOS "Custom App → Import compose".
services:
  xrd:
    image: ghcr.io/akvaithi/xrd-graphitization-analyzer:latest
    container_name: xrd-analyzer
    ports:
      - "8000:8000"          # host:container — change the host side if 8000 is taken
    restart: unless-stopped

    # --- AI deconvolution assist (the "Suggest deconvolution" button) -----------
    # The web/Docker build uses the Anthropic Claude API so the server stays a thin
    # tier (inference is offloaded to the cloud — good for low-power servers). The
    # native desktop app uses a bundled LOCAL model instead and needs none of this.
    # Get a key at https://console.anthropic.com/ and put it in a .env next to this
    # file (ANTHROPIC_API_KEY=sk-ant-...) — never commit the key.
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # - ANTHROPIC_MODEL=claude-opus-4-8   # optional override (this is the default)
    # Key not set → the AI button errors cleanly; the rest of the app works.

    # (image already defines PORT=8000 and a HEALTHCHECK)
