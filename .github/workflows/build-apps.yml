name: Build desktop apps

# PyInstaller can't cross-compile, so build the macOS .app on macOS and the
# Windows .exe on Windows. Runs on demand and on version tags (assets attach to
# the matching GitHub release).
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to attach assets to the release on tags

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            zip: XRD-Graphitization-Analyzer-macOS.zip
          - os: windows-latest
            zip: XRD-Graphitization-Analyzer-Windows.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-build.txt

      - name: Build with PyInstaller
        run: pyinstaller packaging/xrd.spec --noconfirm

      - name: Package (macOS .app)
        if: runner.os == 'macOS'
        run: |
          cd dist
          ditto -c -k --keepParent "XRD Graphitization Analyzer.app" "${{ matrix.zip }}"

      - name: Package (Windows folder)
        if: runner.os == 'Windows'
        run: |
          cd dist
          Compress-Archive -Path "XRD Graphitization Analyzer" -DestinationPath "${{ matrix.zip }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip }}
          path: dist/${{ matrix.zip }}

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.zip }}
