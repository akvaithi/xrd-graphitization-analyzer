name: Tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest
      # Synthetic math + uncertainty/range tests run here; gold-data and Swift
      # parity tests skip automatically (data is gitignored, Swift not built in CI).
      - run: python -m pytest tests/ -q
